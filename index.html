<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Yuki Games - H Game Downloads</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0d0a14;--card:#1a1228;--card2:#211832;--accent:#a855f7;--accent2:#7c3aed;--accent3:#c084fc;--glow:rgba(168,85,247,.28);--txt:#f1e8ff;--muted:#8b7aa3;--border:#2d1f47;--r:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Nunito',sans-serif;font-size:14px;line-height:1.6;user-select:none;-webkit-user-select:none;overflow-x:hidden}
a{text-decoration:none;color:inherit}
img{display:block;max-width:100%}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#2d1f47;border-radius:2px}::-webkit-scrollbar-thumb:hover{background:var(--accent)}

/* HEADER */
header{background:rgba(13,10,20,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:300;box-shadow:0 2px 20px rgba(0,0,0,.4)}
.hdr{max-width:900px;margin:0 auto;padding:0 16px;height:66px;display:flex;align-items:center;gap:12px}
.logo-img{cursor:pointer}.logo-img img{width:175px;height:auto}
.spacer{flex:1}
.search-wrap{position:relative}
.search-icon-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .22s}
.search-icon-btn:hover{border-color:var(--accent);color:var(--accent);box-shadow:0 0 12px var(--glow)}
.search-icon-btn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.search-box{display:none;position:absolute;top:calc(100% + 10px);right:0;width:280px;background:var(--card2);border:1px solid var(--accent);border-radius:12px;padding:10px;box-shadow:0 16px 48px rgba(0,0,0,.7),0 0 24px var(--glow);z-index:999}
.search-box.open{display:flex;gap:6px}
.search-box input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--txt);padding:9px 12px;font-size:13px;font-family:'Nunito',sans-serif;outline:none}
.search-box input:focus{border-color:var(--accent)}
.search-box button{background:var(--accent);border:none;border-radius:8px;color:#fff;font-weight:800;font-size:12px;padding:9px 14px;cursor:pointer;font-family:'Nunito',sans-serif}

/* NAV */
#site-nav{background:var(--card2);border-bottom:1px solid var(--border)}
#site-nav-inner{max-width:900px;margin:0 auto;padding:0 16px;display:flex}
.nav-a{display:inline-block;padding:11px 18px;font-size:13px;font-weight:700;color:var(--muted);border-bottom:3px solid transparent;transition:all .2s;cursor:pointer}
.nav-a.active{color:var(--accent3);border-bottom-color:var(--accent)}

/* PAGES */
.page{display:none}.page.active{display:block}
.wrap{max-width:900px;margin:0 auto;padding:22px 16px}
.sh{font-size:17px;font-weight:900;color:#fff;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.sh::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent)}
.sh-c{font-size:12px;font-weight:600;color:var(--muted)}

/* GAME CARD - ngang lon */
.game-list{display:flex;flex-direction:column;gap:14px;margin-bottom:28px}
.gcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:transform .22s,box-shadow .22s,border-color .22s;display:flex;align-items:stretch}
.gcard:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.5),0 0 0 1px rgba(168,85,247,.4),0 0 28px rgba(168,85,247,.12);border-color:rgba(168,85,247,.5)}
.gcard-thumb{flex-shrink:0;width:200px;position:relative;overflow:hidden}
.gcard-thumb img{width:200px;height:100%;min-height:130px;object-fit:cover;transition:transform .35s;display:block}
.gcard:hover .gcard-thumb img{transform:scale(1.06)}
.gcard-thumb-ov{position:absolute;inset:0;background:linear-gradient(to right,transparent 55%,rgba(26,18,40,.7) 100%)}
.gb-new{position:absolute;top:10px;left:10px;background:rgba(233,30,99,.92);color:#fff;font-size:9px;font-weight:800;padding:3px 9px;border-radius:6px;text-transform:uppercase;z-index:2}
.gcard-info{flex:1;padding:16px 18px;display:flex;flex-direction:column;justify-content:space-between;gap:8px}
.gcard-title{font-size:15px;font-weight:800;color:#ecdeff;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.gcard-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.gcard-size,.gcard-time{font-size:12px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:4px}
.gcard-size svg,.gcard-time svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.gcard-bottom{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.gcard-uploader{display:flex;align-items:center;gap:6px;cursor:pointer;padding:3px 0}
.gcard-uploader:hover .up-name{color:var(--accent3)}
.up-ava{width:22px;height:22px;border-radius:50%;object-fit:cover;border:1px solid var(--border);flex-shrink:0}
.up-name{font-size:11px;font-weight:700;color:var(--muted);transition:color .2s}
.up-dot{font-size:10px;color:#3d2a55}
.gcard-dl{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:12px;font-weight:800;padding:7px 18px;border-radius:9px;text-transform:uppercase;transition:all .2s;box-shadow:0 3px 12px var(--glow);white-space:nowrap}
.gcard:hover .gcard-dl{box-shadow:0 6px 22px rgba(168,85,247,.55);transform:scale(1.04)}

/* DETAIL */
.detail-wrap{max-width:780px;margin:0 auto;padding:22px 16px}
.back-btn{display:inline-flex;align-items:center;gap:7px;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;margin-bottom:20px;padding:8px 14px;border-radius:10px;background:var(--card);border:1px solid var(--border);transition:all .2s}
.back-btn:hover{color:var(--accent3);border-color:var(--accent);box-shadow:0 0 12px var(--glow)}
.back-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.d-cover{width:100%;max-height:320px;object-fit:cover;border-radius:var(--r);border:1px solid var(--border);margin-bottom:18px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.d-title{font-size:21px;font-weight:900;color:#fff;line-height:1.3;margin-bottom:5px}
.d-bydev{font-size:12px;color:var(--muted);margin-bottom:6px}
.d-time{display:inline-flex;align-items:center;gap:5px;background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:4px 10px;font-size:11px;color:var(--muted);margin-bottom:14px}
.d-time svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}

/* UPLOADER CARD detail */
.uc-card{display:flex;align-items:center;gap:12px;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:18px;cursor:pointer;transition:border-color .2s,box-shadow .2s}
.uc-card:hover{border-color:var(--accent);box-shadow:0 0 14px var(--glow)}
.uc-ava{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);flex-shrink:0}
.uc-info{flex:1}
.uc-name{font-size:14px;font-weight:800;color:#fff;margin-bottom:1px}
.uc-role{font-size:11px;color:var(--muted)}
.uc-arr svg{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.uc-card:hover .uc-arr svg{stroke:var(--accent3)}

.info-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:18px}
.info-box-head{background:var(--card2);padding:10px 16px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--accent3);border-bottom:1px solid var(--border)}
.info-table{width:100%;border-collapse:collapse}
.info-table tr{border-bottom:1px solid var(--border)}.info-table tr:last-child{border-bottom:none}
.info-table td{padding:10px 16px;font-size:13px}
.info-table td:first-child{color:var(--muted);width:120px;font-weight:600}
.info-table td:last-child{color:#ecdeff;font-weight:700}
.d-sec{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--accent3);margin:22px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.d-desc{font-size:13px;color:#9d8cb3;line-height:1.8;margin-bottom:16px}
.shots{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:22px}
.shots img{width:100%;border-radius:10px;border:1px solid var(--border)}

/* DOWNLOAD */
.dl-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:28px 16px;text-align:center;position:relative;overflow:hidden}
.dl-box::before{content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:240px;height:240px;background:radial-gradient(circle,rgba(168,85,247,.08) 0%,transparent 70%);pointer-events:none}
.dl-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:20px}
#dl-start-btn{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;padding:15px 56px;border-radius:14px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;border:none;box-shadow:0 6px 28px var(--glow);transition:all .2s}
#dl-start-btn:hover{transform:scale(1.05);box-shadow:0 8px 36px rgba(168,85,247,.6)}
#dl-waiting{display:none;margin-bottom:0}
.dl-ring{display:inline-flex;flex-direction:column;align-items:center;gap:3px;margin-bottom:16px}
.dl-ring .dn{font-size:52px;font-weight:900;color:var(--accent3);line-height:1;text-shadow:0 0 30px var(--glow)}
.dl-ring .dl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
#dl-bar-wrap{width:220px;height:3px;background:var(--border);border-radius:2px;margin:0 auto;overflow:hidden}
#dl-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--accent2),var(--accent3));border-radius:2px;transition:width 1s linear}
#dl-real-btn{display:none;border:none;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;padding:15px 56px;border-radius:14px;text-transform:uppercase;letter-spacing:.5px;position:relative;overflow:hidden;box-shadow:0 6px 28px var(--glow);animation:popIn .45s cubic-bezier(.175,.885,.32,1.275)}
#dl-real-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(110deg,transparent 25%,rgba(255,255,255,.2) 50%,transparent 75%);transform:translateX(-100%);animation:shine 2.5s 1s infinite}
@keyframes popIn{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes shine{to{transform:translateX(200%)}}
#dl-real-btn:hover{transform:scale(1.05);box-shadow:0 8px 36px rgba(168,85,247,.6)}
.dl-note{font-size:11px;color:#3d2a55;margin-top:14px}
.dl-note b{color:var(--accent3)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:500;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:18px;width:100%;max-width:340px;overflow:hidden;animation:slideUp .3s cubic-bezier(.175,.885,.32,1.275)}
@keyframes slideUp{from{transform:translateY(32px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-cover{height:80px;background:linear-gradient(135deg,#1a0a2e,#2d1260)}
.modal-ava-wrap{display:flex;justify-content:center;margin-top:-32px;margin-bottom:10px}
.modal-ava{width:64px;height:64px;border-radius:50%;object-fit:cover;border:3px solid var(--accent);box-shadow:0 0 20px var(--glow)}
.modal-body{padding:0 20px 20px;text-align:center}
.modal-name{font-size:19px;font-weight:900;color:#fff;margin-bottom:4px}
.modal-role-badge{display:inline-block;background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.25);color:var(--accent3);font-size:11px;font-weight:700;padding:3px 12px;border-radius:20px;margin-bottom:10px}
.modal-bio{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:14px}
.modal-stats{display:flex;justify-content:center;gap:28px;padding:12px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:14px}
.mstat-n{font-size:20px;font-weight:900;color:var(--accent3)}
.mstat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:1px}
.mgames-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px;text-align:left}
.mgame-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer;text-align:left}
.mgame-item:last-child{border-bottom:none}
.mgame-item:hover .mgi-title{color:var(--accent3)}
.mgi-img{width:36px;height:36px;border-radius:7px;object-fit:cover;border:1px solid var(--border);flex-shrink:0}
.mgi-title{font-size:12px;font-weight:700;color:#cbd5e1;transition:color .2s;flex:1}
.mgi-size{font-size:10px;color:var(--muted)}
.modal-close{width:100%;background:var(--card2);border:1px solid var(--border);color:var(--muted);padding:10px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;margin-top:14px}
.modal-close:hover{color:var(--txt);border-color:#3d2a55}

/* FOOTER */
footer{background:#090712;border-top:1px solid var(--border);margin-top:52px;padding:24px 16px;text-align:center}
.footer-copy{font-size:11px;color:#2d1f47;margin-top:10px}

/* RESPONSIVE */
@media(max-width:600px){
  .gcard-thumb{width:120px}.gcard-thumb img{width:120px;min-height:110px}
  .gcard-info{padding:12px 14px}.gcard-title{font-size:13px}
  .shots{grid-template-columns:1fr}
  .logo-img img{width:140px}.hdr{height:58px}
  .d-title{font-size:18px}
}
</style>
</head>

  for (var i = 0; i < list.length; i++) {
    var x = list[i];
    var up = UPLOADERS[x.uploader] || {name:'Unknown', avatar:'', role:'', id:''};
    html += '<div class="gcard" data-id="' + x.id + '">';
    html += '<div class="gcard-thumb">';
    html += '<img src="' + x.cover + '" alt="' + x.name + '" loading="lazy"/>';
    html += '<div class="gcard-thumb-ov"></div>';
    if (x.isNew) html += '<span class="gb-new">New</span>';
    html += '</div>';
    html += '<div class="gcard-info">';
    html += '<div class="gcard-title">' + x.title + '</div>';
    html += '<div class="gcard-meta">';
    html += '<span class="gcard-size"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' + x.size + '</span>';
    html += '<span class="gcard-time"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>' + timeAgo(x.uploadDate) + '</span>';
    html += '</div>';
    html += '<div class="gcard-bottom">';
    html += '<div class="gcard-uploader" data-uid="' + up.id + '">';
    html += '<img class="up-ava" src="' + up.avatar + '" alt="' + up.name + '"/>';
    html += '<span class="up-name">' + up.name + '</span>';
    html += '<span class="up-dot">&bull; ' + up.role + '</span>';
    html += '</div>';
    html += '<span class="gcard-dl">Download</span>';
    html += '</div>';
    html += '</div></div>';
  }
  g.innerHTML = html;

  // Gan event sau khi render
  var cards = g.querySelectorAll('.gcard');
  for (var j = 0; j < cards.length; j++) {
    (function(card) {
      var gid = parseInt(card.getAttribute('data-id'));
      card.addEventListener('click', function() { showDetail(gid); });
      var upEl = card.querySelector('.gcard-uploader');
      if (upEl) {
        upEl.addEventListener('click', function(e) {
          e.stopPropagation();
          openUploader(upEl.getAttribute('data-uid'));
        });
      }
    })(cards[j]);
  }
}

function showDetail(id) {
  var x = null;
  for (var i = 0; i < GAMES.length; i++) { if (GAMES[i].id === id) { x = GAMES[i]; break; } }
  if (!x) return;
  var up = UPLOADERS[x.uploader] || {name:'Unknown', avatar:'', role:''};
  currentDlLink = x.dlLink;
  currentUploaderId = x.uploader;
  document.getElementById('d-cover').src = x.cover;
  document.getElementById('d-title').textContent = x.title;
  document.getElementById('d-bydev').textContent = 'by ' + x.dev;
  document.getElementById('d-time-txt').textContent = 'Uploaded ' + timeAgo(x.uploadDate);
  document.getElementById('uc-ava').src = up.avatar;
  document.getElementById('uc-name').textContent = up.name;
  document.getElementById('d-name').textContent = x.name;
  document.getElementById('d-version').textContent = x.version;
  document.getElementById('d-developer').textContent = x.dev;
  document.getElementById('d-size').textContent = x.size;
  document.getElementById('d-uploaded').textContent = formatDate(x.uploadDate);
  document.getElementById('d-desc').textContent = x.desc;
  var shotsHtml = '';
  for (var j = 0; j < x.screenshots.length; j++) {
    shotsHtml += '<img src="' + x.screenshots[j] + '" alt="ss" loading="lazy"/>';
  }
  document.getElementById('d-shots').innerHTML = shotsHtml;
  resetDl();
  showPage('detail');
  window.scrollTo({top:0, behavior:'smooth'});
}

function resetDl() {
  clearInterval(dlTimer);
  document.getElementById('dl-start-btn').style.display = 'inline-block';
  document.getElementById('dl-waiting').style.display = 'none';
  document.getElementById('dl-real-btn').style.display = 'none';
  document.getElementById('dl-num').textContent = '15';
  document.getElementById('dl-bar').style.width = '0%';
}

function startCountdown() {
  document.getElementById('dl-start-btn').style.display = 'none';
  document.getElementById('dl-waiting').style.display = 'block';
  document.getElementById('dl-real-btn').style.display = 'none';
  var t = 15;
  dlTimer = setInterval(function() {
    t--;
    document.getElementById('dl-num').textContent = t;
    document.getElementById('dl-bar').style.width = (((15-t)/15)*100) + '%';
    if (t <= 0) {
      clearInterval(dlTimer);
      document.getElementById('dl-waiting').style.display = 'none';
      document.getElementById('dl-real-btn').style.display = 'inline-block';
    }
  }, 1000);
}

function doDownload() {
  if (currentDlLink && currentDlLink !== '#') window.open(currentDlLink, '_blank');
}

function openUploaderCurrent() { openUploader(currentUploaderId); }

function openUploader(uid) {
  var up = UPLOADERS[uid];
  if (!up) return;
  document.getElementById('modal-ava').src = up.avatar;
  document.getElementById('modal-name').textContent = up.name;
  document.getElementById('modal-role').textContent = up.role;
  document.getElementById('modal-bio').textContent = up.bio;
  document.getElementById('modal-uploads').textContent = up.uploads;
  document.getElementById('modal-joined').textContent = up.joined;
  var gamesHtml = '';
  for (var i = 0; i < GAMES.length; i++) {
    if (GAMES[i].uploader === uid) {
      var g = GAMES[i];
      gamesHtml += '<div class="mgame-item" data-gid="' + g.id + '">';
      gamesHtml += '<img class="mgi-img" src="' + g.cover + '" alt="' + g.name + '"/>';
      gamesHtml += '<span class="mgi-title">' + g.name + '</span>';
      gamesHtml += '<span class="mgi-size">' + g.size + '</span>';
      gamesHtml += '</div>';
    }
  }
  document.getElementById('modal-games').innerHTML = gamesHtml;
  // Event cho game items trong modal
  var items = document.querySelectorAll('.mgame-item');
  for (var j = 0; j < items.length; j++) {
    (function(item) {
      item.addEventListener('click', function() {
        closeModal();
        showDetail(parseInt(item.getAttribute('data-gid')));
      });
    })(items[j]);
  }
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function showPage(n) {
  var pages = document.querySelectorAll('.page');
  for (var i = 0; i < pages.length; i++) pages[i].classList.remove('active');
  document.getElementById('page-' + n).classList.add('active');
  if (n !== 'detail') clearInterval(dlTimer);
}

function goBack() { showPage('home'); }

// Search
var st = document.getElementById('search-toggle');
var sb = document.getElementById('search-box');
st.addEventListener('click', function(e) {
  e.stopPropagation();
  sb.classList.toggle('open');
  if (sb.classList.contains('open')) document.getElementById('search-input').focus();
});
document.addEventListener('click', function(e) {
  if (!sb.contains(e.target) && e.target !== st) sb.classList.remove('open');
});
document.getElementById('search-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});
function doSearch() {
  var q = document.getElementById('search-input').value.toLowerCase().trim();
  sb.classList.remove('open');
  var res = [];
  for (var i = 0; i < GAMES.length; i++) {
    var g = GAMES[i];
    if (!q || g.title.toLowerCase().indexOf(q) > -1 || g.name.toLowerCase().indexOf(q) > -1 || g.dev.toLowerCase().indexOf(q) > -1) {
      res.push(g);
    }
  }
  renderList(res);
  showPage('home');
}

// Init
document.getElementById('yr').textContent = new Date().getFullYear();
renderList(GAMES);

// Block copy
document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
document.addEventListener('copy', function(e) { e.preventDefault(); });
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && ['c','C','u','U','s','S','a','A'].indexOf(e.key) > -1) e.preventDefault();
  if (e.key === 'F12' || (e.ctrlKey && e.shiftKey)) e.preventDefault();
});
</script>
